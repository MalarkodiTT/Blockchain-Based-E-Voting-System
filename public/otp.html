<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email OTP Verification - Secure Vote</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #0f172a; display: flex; height: 100vh; color: #fff; }
        
        .inbox-panel { width: 360px; background: #1e293b; border-right: 1px solid #334155; padding: 25px; display: flex; flex-direction: column; }
        .inbox-header { font-size: 20px; font-weight: bold; margin-bottom: 20px; color: #38bdf8; display: flex; align-items: center; gap: 10px; }
        .mail-card { background: #0f172a; border: 1px solid #334155; padding: 15px; border-radius: 8px; }
        .mail-subject { font-weight: bold; font-size: 14px; margin-bottom: 5px; color: #f8fafc; }
        .mail-snippet { font-size: 13px; color: #94a3b8; }
        .otp-display-box { margin-top: 10px; background: rgba(56, 189, 248, 0.1); border: 1px dashed #eaeff1; padding: 8px; text-align: center; border-radius: 6px; color: #38bdf8; font-weight: bold; font-size: 16px; }

        .verification-container { flex: 1; display: flex; justify-content: center; align-items: center; }
        .card { background: #1e293b; padding: 40px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 420px; text-align: center; border: 1px solid #334155; }
        h2 { margin-bottom: 10px; }
        p { color: #e6e9ed; font-size: 17px; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; font-size: 19px; color: #fff; text-align: center; letter-spacing: 5px; margin-bottom: 15px; outline: none; }
        input:focus { border-color: #dfe7eb; }
        .btn { width: 100%; padding: 12px; background: #0284c7; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 20px; font-weight: 600; transition: 0.3s; }
        .btn:hover { background: #0369a1; }
        .msg { color: #f87171; font-size: 14px; margin-top: 15px; }
    </style>
</head>
<body>

<div class="inbox-panel">
    <div class="inbox-header">📥 Mail Inbox</div>
    <div class="mail-card">
        <div class="mail-subject">Election Commission OTP</div>
        <div class="mail-snippet">Your secure verification code is:</div>
        <div class="otp-display-box" id="inboxOtpText">Loading...</div>
        <small style="color: #64748b; display: block; margin-top: 8px;">(Type this code manually into the form)</small>
    </div>
</div>

<div class="verification-container">
    <div class="card">
        <h2>Two-Factor Auth</h2>
        <p>Enter the 6-digit OTP from your inbox.</p>
        <input type="text" id="otpInput" maxlength="6" placeholder="------">
        <button class="btn" onclick="verifyOtp()">Verify & Proceed</button>
        <div class="msg" id="msg"></div>
    </div>
</div>

<script>
    const voterId = localStorage.getItem('voterId');
    const actualOtp = localStorage.getItem('otp');

    if (!voterId) {
        window.location.href = 'index.html';
    } else {
        document.getElementById('inboxOtpText').innerText = actualOtp;
    }

    async function verifyOtp() {
        const otp = document.getElementById('otpInput').value.trim();
        const msg = document.getElementById('msg');

        if (!otp) {
            msg.innerText = "Please enter the OTP manually!";
            return;
        }

        try {
            const res = await fetch('/api/verify-otp', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ voterId, otp })
            });
            const data = await res.json();

            if (data.success) {
                window.location.href = 'dashboard.html';
            } else {
                msg.innerText = data.message;
            }
        } catch (err) {
            msg.innerText = "Verification failed!";
        }
    }
</script>

</body>
</html>
